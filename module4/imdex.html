<!DOCTYPE html>
<html lang="en">
<head>
    <title>Document</title>
    <link rel="icon" type="image/x-icon" href="images/image.png"
</head>
<body>

     <!--Block elements-->

    <h1>This is my first heading</h1>

    <h2>This is my second heading</h2>

    <p>This is my first paragraph</p>

    <ul>
    <li>HTML</li>
    <li>css</li>
    <li>Javascript</li>
    <li>PHP</li>
    </ul>

    <!--Inline elements-->

    <img src="images/image.png"  width="200" height="200">

    <a href="https://shkolladigjitale.com/">https://shkolladigjitale.com/</a>

    <cite>This is the cite element</cite>
    <strong>This is the strong element</strong>
    <span>This is the span element</span>

    <br>
    <hr>

    <video width="400" height="230" controls poster="images/image.png">

     <source src="Computer.mp4" video="video/mp4">
     <source src="Computer.ogg" type="video/ogg">
    </video>

    <audio controls>

     <source src="audio.mp3" video="audio/mpeg">
     <source src="audio.mp3" type="audio/ogg"> 
    </audio>

    <br>

    <iframe src="https://shkolladigjitale.com/" width="1200" height="600" title="iframe example"></iframe>

    <br>

    <iframe width="560" height="315" src="https://www.youtube.com/embed/d86ws7mQYIg?si=bv4_eNokWkdfyLcO"
     title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write;
      encrypted-media; gyroscope; picture-in-picture;  web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen>
    </iframe>
</body>
</html>
